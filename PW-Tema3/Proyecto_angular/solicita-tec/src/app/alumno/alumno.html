<div class="layout">

  <header class="header">
    <h2>Sistema de Solicitud de Documentos</h2>
    <div class="user">👤 Alumno</div>
  </header>

  <div class="container">

    
    <section class="panel left">

      <h2>Nueva solicitud</h2>

      <form>

        <label>Tipo de documento</label>
        <select [(ngModel)]="tipo_documento" name="tipo">
          <option value="Kardex">Kardex</option>
          <option value="Constancia de estudios">Constancia de estudios</option>
          <option value="Boleta">Boleta</option>
          <option value="Servicio social">Servicio social</option>
        </select>

        <label>Motivo</label>
        <textarea
          [(ngModel)]="motivo"
          name="motivo"
          placeholder="Escribe el motivo..."
        ></textarea>

        <button type="button" (click)="enviarSolicitud()">
          Enviar solicitud
        </button>

      </form>

    </section>

    
    <section class="panel right">

      <h2>📊 Mis solicitudes</h2>

      <div class="card">
        <p><b>Kardex</b></p>
        <span class="status pendiente">Pendiente</span>
      </div>

    </section>

  </div>
</div>
